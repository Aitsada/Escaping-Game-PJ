<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Survive: a killer chase puzzle game with timed levels and local stars."
    />
    <title>Survive</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="hud" aria-label="Game status">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Killer Chase</p>
            <h1>Survive</h1>
          </div>
        </div>

        <div class="stats">
          <div>
            <span>ด่าน</span>
            <strong id="levelLabel">1 / 20</strong>
          </div>
          <div>
            <span>เวลา</span>
            <strong id="timerLabel">00:00.0</strong>
          </div>
          <div>
            <span>ดาว</span>
            <strong id="starLabel">☆☆☆</strong>
          </div>
        </div>

        <div class="actions">
          <button id="levelsButton" type="button">เลือกด่าน</button>
          <button id="restartButton" type="button">เริ่มใหม่</button>
        </div>
      </section>

      <section class="game-area" aria-label="Survive game board">
        <canvas id="gameCanvas" width="651" height="651"></canvas>
      </section>

      <section class="control-panel" aria-label="Controls">
        <div>
          <span>ควบคุม</span>
          <strong>W A S D หรือปุ่มลูกศร</strong>
        </div>
        <div id="statusText" class="status-text">หนีไปที่ทางออก ก่อน killer ไล่ทัน</div>
      </section>
    </main>

    <div id="levelsDialog" class="levels-overlay" aria-hidden="true">
      <section class="levels-dialog" aria-labelledby="levelsTitle" role="dialog" aria-modal="true">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Progress</p>
            <h2 id="levelsTitle">เลือกด่าน</h2>
          </div>
          <button id="closeLevelsButton" class="icon-button" type="button" aria-label="ปิด">
            ×
          </button>
        </div>
        <div id="levelsGrid" class="levels-grid"></div>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
